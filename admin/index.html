<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moonherb Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      :root {
        --bg: #d8ddd7;
        --panel: #f7f5ef;
        --ink: #191723;
        --muted: #77766f;
        --line: rgba(25, 23, 35, 0.13);
        --sage: #b9ddb3;
        --sage-dark: #54745c;
        --lavender: #a996e8;
        --gold: #c9a75f;
        --shadow: 0 24px 70px rgba(48, 54, 50, 0.17);
        --font: "Noto Serif SC", "STKaiti", "KaiTi", "FangSong", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 86% 10%, rgba(255, 255, 255, 0.42), transparent 22rem),
          linear-gradient(135deg, #d3d9d4 0%, var(--bg) 48%, #cfd6d1 100%);
        color: var(--ink);
        font-family: var(--font);
        font-weight: 600;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1180px, calc(100% - 36px));
        margin: 0 auto;
        padding: 34px 0;
      }

      .topbar,
      .panel,
      .editor,
      .list-card {
        border: 1px solid rgba(255, 255, 255, 0.66);
        background: rgba(248, 247, 241, 0.9);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 72px;
        border-radius: 18px;
        padding: 14px 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 12px;
        background: var(--ink);
        color: white;
        font-size: 20px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        font-weight: 900;
      }

      .brand p,
      .muted {
        color: var(--muted);
        line-height: 1.5;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        min-height: 40px;
        border: 0;
        border-radius: 999px;
        background: var(--ink);
        color: white;
        padding: 0 18px;
        font-weight: 900;
      }

      .ghost {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.48);
        color: var(--ink);
      }

      .workspace {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 18px;
        margin-top: 18px;
      }

      .panel,
      .editor {
        border-radius: 24px;
        padding: 22px;
      }

      .tabs {
        display: grid;
        gap: 10px;
      }

      .tab {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.42);
        color: var(--ink);
        padding: 0 14px;
        text-align: left;
        font-weight: 900;
      }

      .tab.active {
        background: var(--ink);
        color: white;
      }

      .editor-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #3e403c;
        font-size: 13px;
        font-weight: 900;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--ink);
        outline: 0;
        padding: 12px 13px;
      }

      textarea {
        min-height: 98px;
        resize: vertical;
      }

      .form {
        display: grid;
        gap: 14px;
        margin-bottom: 18px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .list-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        border-radius: 16px;
        padding: 14px;
        box-shadow: none;
      }

      .list-card strong {
        display: block;
        margin-bottom: 4px;
        font-size: 17px;
      }

      .list-card small {
        color: var(--muted);
      }

      .delete {
        min-height: 34px;
        border: 1px solid rgba(180, 64, 64, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.5);
        color: #934747;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 900;
      }

      .row-actions {
        display: flex;
        gap: 8px;
      }

      .edit {
        min-height: 34px;
        border: 1px solid rgba(84, 116, 92, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.5);
        color: var(--sage-dark);
        padding: 0 12px;
        font-size: 12px;
        font-weight: 900;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .image-field {
        border: 1px dashed rgba(84, 116, 92, 0.35);
        border-radius: 16px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.34);
      }

      .image-preview {
        width: 120px;
        height: 120px;
        border-radius: 16px;
        background: rgba(25, 23, 35, 0.06);
        object-fit: cover;
        aspect-ratio: 1 / 1;
      }

      .status {
        min-height: 22px;
        color: var(--sage-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .login-card {
        max-width: 520px;
        margin: 90px auto 0;
        border-radius: 24px;
        padding: 30px;
        text-align: center;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .grid,
        .topbar,
        .editor-head {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div class="brand">
          <span class="mark">☾</span>
          <div>
            <h1>Moonherb Studio</h1>
            <p>只改内容，不碰代码。保存后会发布到 moonherb.netlify.app。</p>
          </div>
        </div>
        <div class="actions">
          <span class="status" id="statusText">等待登录</span>
          <button class="button ghost" id="viewSiteButton" type="button">查看网站</button>
          <button class="button" id="loginButton" type="button">登录后台</button>
        </div>
      </section>

      <section class="panel login-card" id="loginCard">
        <h2>先登录你的后台账号</h2>
        <p class="muted">使用你刚才在 Netlify 邮件里设置的邮箱和密码。</p>
      </section>

      <section class="workspace hidden" id="workspace">
        <aside class="panel">
          <div class="tabs">
            <button class="tab active" type="button" data-section="herbs">草药档案 <span id="herbCount">0</span></button>
            <button class="tab" type="button" data-section="rituals">仪式专区 <span id="ritualCount">0</span></button>
            <button class="tab" type="button" data-section="recipes">配方手记 <span id="recipeCount">0</span></button>
          </div>
        </aside>

        <section class="editor">
          <div class="editor-head">
            <div>
              <h2 id="sectionTitle">草药档案</h2>
              <p class="muted" id="sectionHint">新增或删除草药，保存后公开页会同步。</p>
            </div>
            <button class="button" id="saveButton" type="button">保存并发布</button>
          </div>

          <form class="form" id="entryForm">
            <div id="formFields"></div>
            <div class="form-actions">
              <button class="button ghost" type="submit" id="addButton">新增</button>
              <button class="button ghost hidden" type="button" id="cancelEditButton">取消编辑</button>
            </div>
          </form>

          <div class="list" id="entryList"></div>
        </section>
      </section>
    </main>

    <script>
      const contentPath = "/.netlify/git/github/contents/data/content.json";
      const defaults = { herbs: [], rituals: [], recipes: [], sources: [] };
      const labels = {
        herbs: { title: "草药档案", hint: "新增、编辑或删除草药，保存后公开页会同步。", add: "新增草药" },
        rituals: { title: "仪式专区", hint: "新增、编辑仪式名称、时间、物品和步骤。", add: "新增仪式" },
        recipes: { title: "配方手记", hint: "新增或编辑配方卡，公开页会进入配方手记。", add: "新增配方" },
      };

      let currentUser = null;
      let currentSection = "herbs";
      let fileSha = "";
      let content = structuredClone(defaults);
      let editingIndex = -1;
      let currentImageData = "";

      const loginButton = document.querySelector("#loginButton");
      const viewSiteButton = document.querySelector("#viewSiteButton");
      const saveButton = document.querySelector("#saveButton");
      const loginCard = document.querySelector("#loginCard");
      const workspace = document.querySelector("#workspace");
      const statusText = document.querySelector("#statusText");
      const tabs = document.querySelectorAll("[data-section]");
      const sectionTitle = document.querySelector("#sectionTitle");
      const sectionHint = document.querySelector("#sectionHint");
      const addButton = document.querySelector("#addButton");
      const cancelEditButton = document.querySelector("#cancelEditButton");
      const entryForm = document.querySelector("#entryForm");
      const formFields = document.querySelector("#formFields");
      const entryList = document.querySelector("#entryList");

      function setStatus(message) {
        statusText.textContent = message;
      }

      function encodeBase64(value) {
        return btoa(unescape(encodeURIComponent(value)));
      }

      function decodeBase64(value) {
        return decodeURIComponent(escape(atob(value.replace(/\n/g, ""))));
      }

      async function getToken() {
        if (!currentUser) throw new Error("请先登录。");
        return currentUser.jwt();
      }

      async function requestGitGateway(path, options = {}) {
        const token = await getToken();
        return fetch(path, {
          ...options,
          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
      }

      function normalizeContent(raw) {
        return {
          herbs: Array.isArray(raw.herbs) ? raw.herbs : [],
          rituals: Array.isArray(raw.rituals) ? raw.rituals : [],
          recipes: Array.isArray(raw.recipes) ? raw.recipes : [],
          sources: Array.isArray(raw.sources) ? raw.sources : [],
        };
      }

      async function loadContent() {
        setStatus("正在读取内容...");
        const response = await requestGitGateway(contentPath);
        if (!response.ok) throw new Error("读取失败，请确认 Git Gateway 已开启。");
        const file = await response.json();
        fileSha = file.sha;
        content = normalizeContent(JSON.parse(decodeBase64(file.content)));
        render();
        setStatus("内容已载入");
      }

      async function saveContent() {
        setStatus("正在保存...");
        const body = {
          message: "Update moonherb content from studio",
          content: encodeBase64(JSON.stringify(content, null, 2)),
          sha: fileSha,
          branch: "main",
        };
        const response = await requestGitGateway(contentPath, {
          method: "PUT",
          body: JSON.stringify(body),
        });
        if (!response.ok) throw new Error("保存失败，请稍后再试。");
        const result = await response.json();
        fileSha = result.content.sha;
        setStatus("已保存，Netlify 正在自动发布");
      }

      function splitList(value) {
        return value
          .split(/[,\n、/，]/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function readSquareImage(file) {
        if (!file) return Promise.resolve("");
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;
          reader.onload = () => {
            const image = new Image();
            image.onerror = reject;
            image.onload = () => {
              const size = Math.min(image.width, image.height);
              const canvas = document.createElement("canvas");
              const outputSize = 900;
              canvas.width = outputSize;
              canvas.height = outputSize;
              const context = canvas.getContext("2d");
              context.drawImage(
                image,
                (image.width - size) / 2,
                (image.height - size) / 2,
                size,
                size,
                0,
                0,
                outputSize,
                outputSize,
              );
              resolve(canvas.toDataURL("image/jpeg", 0.82));
            };
            image.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function renderImageField() {
        return `
          <label class="image-field">
            图片（可选，自动裁成 1:1 方图）
            <input name="imageFile" type="file" accept="image/*" />
            <input name="imageUrl" type="hidden" value="${currentImageData || ""}" />
            ${currentImageData ? `<img class="image-preview" src="${currentImageData}" alt="当前图片预览" />` : ""}
          </label>
        `;
      }

      function renderForm() {
        if (currentSection === "herbs") {
          formFields.innerHTML = `
            <div class="grid">
              <label>名称<input name="title" placeholder="例如：月光薄荷" required /></label>
              <label>阴阳属性<input name="yinYang" placeholder="例如：阳性 / 阴性 / 中性" /></label>
            </div>
            <div class="grid">
              <label>行星属性<input name="planet" placeholder="例如：太阳、月亮、水星" /></label>
              <label>元素属性<input name="element" placeholder="例如：火、水、风、土" /></label>
            </div>
            <label>神祗属性<input name="deity" placeholder="例如：阿波罗、赫卡忒、阿佛洛狄忒" /></label>
            <label>关键词<input name="keywords" placeholder="清场、保护、专注、疗愈" required /></label>
            <label>仪式用途<textarea name="ritualUse" placeholder="适合放进哪些仪式、什么时候使用"></textarea></label>
            <label>魔法用途<textarea name="magicUse" placeholder="写下对应的魔法用途、象征含义或搭配方向"></textarea></label>
            ${renderImageField()}
          `;
        }

        if (currentSection === "rituals") {
          formFields.innerHTML = `
            <div class="grid">
              <label>名称<input name="title" placeholder="例如：清晨净场" required /></label>
              <label>适合时间<input name="timing" placeholder="新月夜 / 睡前 / 周日" required /></label>
            </div>
            <label>目标<textarea name="intention" placeholder="这个仪式想帮你完成什么"></textarea></label>
            <label>准备物品<input name="tools" placeholder="盐碗、薰衣草、笔记本" /></label>
            <label>步骤<textarea name="steps" placeholder="每行写一步"></textarea></label>
            ${renderImageField()}
          `;
        }

        if (currentSection === "recipes") {
          formFields.innerHTML = `
            <div class="grid">
              <label>名称<input name="title" placeholder="例如：清晨专注香囊" required /></label>
              <label>用途<input name="use" placeholder="适合什么时候使用" required /></label>
            </div>
            <div class="grid">
              <label>评分<input name="rating" value="5.00" /></label>
              <label>调和度<input name="meter" value="90%" /></label>
            </div>
            <label>标签<input name="tags" placeholder="迷迭香、薄荷、月桂叶" /></label>
            <label>说明<textarea name="detail" placeholder="写下配方说明"></textarea></label>
            <label>步骤<textarea name="steps" placeholder="每行写一步"></textarea></label>
            ${renderImageField()}
          `;
        }
      }

      function setField(name, value) {
        const field = entryForm.elements[name];
        if (field) field.value = Array.isArray(value) ? value.join("、") : value || "";
      }

      function fillForm(entry) {
        if (!entry) return;
        currentImageData = entry.imageUrl || "";
        renderForm();
        setField("title", entry.title);
        setField("imageUrl", entry.imageUrl);

        if (currentSection === "herbs") {
          setField("yinYang", entry.yinYang);
          setField("planet", entry.planet);
          setField("element", entry.element);
          setField("deity", entry.deity);
          setField("keywords", entry.keywords || entry.text);
          setField("ritualUse", entry.ritualUse);
          setField("magicUse", entry.magicUse || entry.detail);
        }

        if (currentSection === "rituals") {
          setField("timing", entry.timing);
          setField("intention", entry.intention);
          setField("tools", entry.tools);
          setField("steps", entry.steps);
        }

        if (currentSection === "recipes") {
          setField("rating", entry.rating || "5.00");
          setField("use", entry.use);
          setField("meter", entry.meter || "90%");
          setField("tags", entry.tags);
          setField("detail", entry.detail);
          setField("steps", entry.steps);
        }
      }

      function resetEditingState() {
        editingIndex = -1;
        currentImageData = "";
        entryForm.reset();
        cancelEditButton.classList.add("hidden");
        addButton.textContent = labels[currentSection].add;
        renderForm();
      }

      function getEntrySummary(entry) {
        if (currentSection === "herbs") return entry.keywords || entry.text || entry.magicUse || entry.detail || "未填写关键词";
        if (currentSection === "rituals") return `${entry.timing || "自选时间"} · ${entry.intention || "未填写目标"}`;
        return `${entry.rating || "5.00"} · ${entry.use || "未填写用途"}`;
      }

      function renderList() {
        const items = content[currentSection] || [];
        entryList.innerHTML = items
          .map(
            (entry, index) => `
              <article class="list-card">
                <div>
                  <strong>${entry.title || "未命名"}</strong>
                  <small>${getEntrySummary(entry)}</small>
                </div>
                <div class="row-actions">
                  <button class="edit" type="button" data-edit="${index}">编辑</button>
                  <button class="delete" type="button" data-delete="${index}">删除</button>
                </div>
              </article>
            `,
          )
          .join("");
      }

      function renderCounts() {
        document.querySelector("#herbCount").textContent = content.herbs.length;
        document.querySelector("#ritualCount").textContent = content.rituals.length;
        document.querySelector("#recipeCount").textContent = content.recipes.length;
      }

      function render() {
        sectionTitle.textContent = labels[currentSection].title;
        sectionHint.textContent = labels[currentSection].hint;
        addButton.textContent = editingIndex >= 0 ? "保存这条修改" : labels[currentSection].add;
        cancelEditButton.classList.toggle("hidden", editingIndex < 0);
        tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.section === currentSection));
        renderForm();
        renderList();
        renderCounts();
      }

      async function createEntry(formData) {
        const imageFile = formData.get("imageFile");
        const imageUrl = imageFile && imageFile.size ? await readSquareImage(imageFile) : formData.get("imageUrl") || "";

        if (currentSection === "herbs") {
          return {
            title: formData.get("title").trim(),
            yinYang: formData.get("yinYang").trim(),
            planet: formData.get("planet").trim(),
            element: formData.get("element").trim(),
            deity: formData.get("deity").trim(),
            keywords: formData.get("keywords").trim(),
            ritualUse: formData.get("ritualUse").trim(),
            magicUse: formData.get("magicUse").trim(),
            text: formData.get("keywords").trim(),
            detail: formData.get("magicUse").trim() || formData.get("ritualUse").trim(),
            color: "custom",
            imageUrl,
            sources: [],
          };
        }

        if (currentSection === "rituals") {
          return {
            title: formData.get("title").trim(),
            timing: formData.get("timing").trim(),
            intention: formData.get("intention").trim(),
            tools: splitList(formData.get("tools") || ""),
            steps: splitList(formData.get("steps") || ""),
            imageUrl,
            sources: [],
          };
        }

        return {
          title: formData.get("title").trim(),
          rating: formData.get("rating").trim() || "5.00",
          use: formData.get("use").trim(),
          meter: formData.get("meter").trim() || "90%",
          tags: splitList(formData.get("tags") || ""),
          detail: formData.get("detail").trim(),
          steps: splitList(formData.get("steps") || ""),
          imageUrl: imageUrl || "./assets/hero-herbs.png",
          sources: [],
        };
      }

      loginButton.addEventListener("click", () => {
        if (currentUser) {
          netlifyIdentity.logout();
          return;
        }
        netlifyIdentity.open("login");
      });

      viewSiteButton.addEventListener("click", () => {
        location.href = "/";
      });

      saveButton.addEventListener("click", async () => {
        try {
          await saveContent();
        } catch (error) {
          setStatus(error.message);
        }
      });

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          currentSection = tab.dataset.section;
          editingIndex = -1;
          currentImageData = "";
          render();
        });
      });

      entryForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const entry = await createEntry(new FormData(entryForm));
        if (editingIndex >= 0) {
          content[currentSection][editingIndex] = entry;
          setStatus("已更新，记得点保存并发布");
        } else {
          content[currentSection].unshift(entry);
          setStatus("已添加，记得点保存并发布");
        }
        editingIndex = -1;
        currentImageData = "";
        entryForm.reset();
        render();
      });

      entryList.addEventListener("click", (event) => {
        const editButton = event.target.closest("[data-edit]");
        if (editButton) {
          editingIndex = Number(editButton.dataset.edit);
          fillForm(content[currentSection][editingIndex]);
          addButton.textContent = "保存这条修改";
          cancelEditButton.classList.remove("hidden");
          entryForm.scrollIntoView({ behavior: "smooth", block: "start" });
          setStatus("正在编辑，改完点保存这条修改");
          return;
        }

        const button = event.target.closest("[data-delete]");
        if (!button) return;
        content[currentSection].splice(Number(button.dataset.delete), 1);
        editingIndex = -1;
        currentImageData = "";
        render();
        setStatus("已删除，记得点保存并发布");
      });

      cancelEditButton.addEventListener("click", () => {
        resetEditingState();
        renderList();
        setStatus("已取消编辑");
      });

      netlifyIdentity.on("init", async (user) => {
        currentUser = user;
        if (!currentUser) return;
        loginButton.textContent = "退出";
        loginCard.classList.add("hidden");
        workspace.classList.remove("hidden");
        try {
          await loadContent();
        } catch (error) {
          setStatus(error.message);
        }
      });

      netlifyIdentity.on("login", async (user) => {
        currentUser = user;
        netlifyIdentity.close();
        loginButton.textContent = "退出";
        loginCard.classList.add("hidden");
        workspace.classList.remove("hidden");
        try {
          await loadContent();
        } catch (error) {
          setStatus(error.message);
        }
      });

      netlifyIdentity.on("logout", () => {
        currentUser = null;
        loginButton.textContent = "登录后台";
        workspace.classList.add("hidden");
        loginCard.classList.remove("hidden");
        setStatus("已退出");
      });

      netlifyIdentity.init();
      render();
    </script>
  </body>
</html>
